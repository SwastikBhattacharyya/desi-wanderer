spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: query-posts
              uri: lb://QUERY-SERVICE
              predicates:
                - Path=/posts/**
                - Method=GET
            - id: query-comments
              uri: lb://QUERY-SERVICE
              predicates:
                - Path=/comments/**
                - Method=GET
            - id: query-images
              uri: lb://QUERY-SERVICE
              predicates:
                - Path=/images/**
                - Method=GET
            - id: query-post-reports
              uri: lb://QUERY-SERVICE
              predicates:
                - Path=/post-reports/**
                - Method=GET
            - id: query-comment-reports
              uri: lb://QUERY-SERVICE
              predicates:
                - Path=/comment-reports/**
                - Method=GET
            - id: blog-service
              uri: lb://BLOG-SERVICE
              predicates:
                - Path=/posts/**,/comments/**,/images/**
                - Method=POST,PUT,PATCH,DELETE
            - id: report-service
              uri: lb://REPORT-SERVICE
              predicates:
                - Path=/post-reports/**,/comment-reports/**
                - Method=POST,PUT,PATCH,DELETE
            - id: graphql
              uri: lb://QUERY-SERVICE
              predicates:
                - Path=/graphql/**
